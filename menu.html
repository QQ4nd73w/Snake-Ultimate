<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Змейка — Меню</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="menu-page">
  <div class="container menu-container">
    <div class="menu-hero">
      <div class="menu-logo">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect rx="12" width="64" height="64" fill="#0ea5a4" />
          <path d="M18 36c4-6 12-6 16 0s12 6 16 0" stroke="#052f2f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="30" cy="26" r="3" fill="#052f2f" />
          <circle cx="42" cy="26" r="3" fill="#052f2f" />
        </svg>
      </div>
      <div class="menu-title">
        <h1>Змейка</h1>
        <p class="menu-sub">Быстрая, отполированная змейка с баффами и испытаниями</p>
      </div>
    </div>
    <div class="menu-body">
      <div style="margin-top:12px">
        <label style="font-weight:700;display:block">Режим</label>
        <select id="menuMode" style="width:100%;margin-top:6px;padding:8px;border-radius:8px">
          <option value="classic">Классический (с баффами)</option>
          <option value="nobuffs">Без баффов</option>
          <option value="timed">На время (60с)</option>
          <option value="insane">Безумие</option>
        </select>
      </div>
      <div style="margin-top:12px">
        <label style="font-weight:700;display:block">Сложность</label>
        <select id="menuDifficulty" style="width:100%;margin-top:6px;padding:8px;border-radius:8px">
          <option value="easy">Легко</option>
          <option value="normal">Нормально</option>
          <option value="hard">Сложно</option>
        </select>
      </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button id="menuMute" type="button" class="theme-toggle tricolor-btn" aria-pressed="false" title="Отключить музыку">🔊</button>
        <button id="menuStart" type="button" class="start-btn tricolor-btn">Начать</button>
      </div>
      <p class="hint" style="margin-top:14px">Выберите режим и сложность, затем нажмите «Начать». Нажмите Enter для быстрого старта.</p>
    </div>
  </div>
  <div id="musicPrompt" style="position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:rgba(0,0,0,0.8);color:white;padding:10px 14px;border-radius:12px;display:none;z-index:9999;box-shadow:0 6px 18px rgba(0,0,0,0.3)">
    <span style="margin-right:10px">Чтобы включить музыку, нажмите:</span>
    <button id="musicEnableBtn" style="background:#0ea5a4;border:none;padding:6px 10px;border-radius:8px;color:#042f2f;font-weight:700">Включить музыку</button>
  </div>
  <script>
    const menuStart = document.getElementById('menuStart');
    const menuMode = document.getElementById('menuMode');
    const menuDifficulty = document.getElementById('menuDifficulty');
    const lastMode = localStorage.getItem('snakeMode') || 'classic';
    const lastDiff = localStorage.getItem('snakeDifficulty') || 'normal';
    if(menuMode) menuMode.value = lastMode;
    if(menuDifficulty) menuDifficulty.value = lastDiff;
    menuStart.addEventListener('click', ()=>{
      const mode = menuMode.value;
      const diff = menuDifficulty.value;
      localStorage.setItem('snakeMode', mode);
      localStorage.setItem('snakeDifficulty', diff);
      const url = new URL(window.location.origin + window.location.pathname.replace(/menu.html$/, 'index.html'));
      url.searchParams.set('mode', mode);
      url.searchParams.set('difficulty', diff);
      window.location.href = url.toString();
    });
    document.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') menuStart.click(); });
    const menuMute = document.getElementById('menuMute');
    function setMuteUI(muted){
      menuMute.setAttribute('aria-pressed', muted ? 'true' : 'false');
      menuMute.textContent = muted ? '🔈' : '🔊';
    }
    let menuAudio = null;
    const snakeMuted = localStorage.getItem('snakeMuted') === 'true';
    setMuteUI(snakeMuted);

    function startMenuMusic(){
      if(menuAudio || localStorage.getItem('snakeMuted') === 'true') return;
      menuAudio = new Audio('menu.mp3');
      menuAudio.loop = true;
      menuAudio.volume = 0.12;
      const p = menuAudio.play();
      if(p && typeof p.then === 'function'){
        p.catch(()=>{});
      }
    }

    function stopMenuMusic(){
      if(menuAudio){ try{ menuAudio.pause(); menuAudio.currentTime = 0; }catch(e){} menuAudio = null; }
    }

    function bootMusicOnGesture(){
      if(localStorage.getItem('snakeMuted') === 'true') return;
      startMenuMusic();
      document.removeEventListener('pointerdown', bootMusicOnGesture);
    }
    document.addEventListener('pointerdown', bootMusicOnGesture);

    if(!snakeMuted){ try{ startMenuMusic(); }catch(e){}
      setTimeout(()=>{
        try{
          const prompt = document.getElementById('musicPrompt');
          const btn = document.getElementById('musicEnableBtn');
          if((!menuAudio) || (menuAudio && menuAudio.paused)){
            if(prompt) prompt.style.display = 'block';
            if(btn) btn.addEventListener('click', ()=>{ try{ startMenuMusic(); }catch(e){} if(prompt) prompt.style.display = 'none'; });
          }
        }catch(e){}
      }, 600);
    }

    menuMute.addEventListener('click', ()=>{
      const nowMuted = localStorage.getItem('snakeMuted') === 'true';
      const newMuted = !nowMuted;
      localStorage.setItem('snakeMuted', newMuted ? 'true' : 'false');
      setMuteUI(newMuted);
      if(newMuted) stopMenuMusic(); else startMenuMusic();
    });

    menuStart.addEventListener('click', ()=>{ stopMenuMusic(); });
  </script>
</body>
</html>
